<section id="services">
  <div class="sec-inner">
    <div class="sec-header">
      <div>
        <div class="sec-tag" appReveal>خدماتنا</div>
        <h2 class="sec-title" appReveal [revealDelay]="1">ما نقدّمه <span>لك</span></h2>
      </div>
      <p class="sec-desc text-right md:text-left" appReveal [revealDelay]="2">
        منظومة متكاملة من حلول التوثيق البصري لمشاريعك الكبرى في المملكة العربية السعودية
      </p>
    </div>

    <div class="services-list" appReveal [revealDelay]="1">
      <div class="srv-item" *ngFor="let srv of services">
        <span class="srv-num">{{ srv.num }}</span>
        <div class="srv-content">
          <h3 class="srv-title">{{ srv.title }}</h3>
          <p class="srv-desc">{{ srv.desc }}</p>
        </div>
        <div class="srv-arrow">
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="rgba(255,255,255,0.4)"
            stroke-width="1.5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H7M17 7v10" />
          </svg>
        </div>
      </div>
    </div>
  </div>
</section>
