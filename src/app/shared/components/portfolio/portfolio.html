<section id="portfolio">
  <div class="sec-inner">
    <!-- Header -->
    <div class="sec-header">
      <div>
        <div class="sec-tag port-tag" appReveal>أعمالنا</div>
        <h2 class="sec-title port-title" appReveal [revealDelay]="1">مشاريع <span>مميزة</span></h2>
      </div>
    </div>

    <!-- Filters -->
    <div class="portfolio-filters" appReveal>
      @for (f of filters; track f.key) {
        <button
          class="filter-btn"
          [class.active]="activeFilter() === f.key"
          (click)="setFilter(f.key)"
        >
          {{ f.label }}
        </button>
      }
    </div>

    <!-- Grid -->
    <div class="portfolio-grid" appReveal [revealDelay]="1">
      @for (item of visibleItems; track $index) {
        <div class="port-item" [class.span-tall]="item.span" (click)="openVideo(item)">
          <div class="port-bg" [ngClass]="item.bgClass">
            @if (item.thumbnail) {
              <img [src]="item.thumbnail" [alt]="item.name" class="port-thumb" />
            }
          </div>
          <div class="port-overlay"></div>

          @if (item.videoId) {
            <div class="port-play">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M8 5v14l11-7z" />
              </svg>
            </div>
          }

          <div class="port-info">
            @if (item.company) {
              <div class="port-company">{{ item.company }}</div>
            }
            <div class="port-cat">{{ item.catLabel }}</div>
            <div class="port-name">{{ item.name }}</div>
          </div>
        </div>
      }
    </div>

    <!-- Show More -->
    @if (hasMore) {
      <div class="port-more-wrap">
        <button class="port-more-btn" (click)="toggleShowAll()">
          <span>{{ showAll() ? 'عرض أقل' : 'شاهد المزيد' }}</span>
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            [style.transform]="showAll() ? 'rotate(180deg)' : 'rotate(0deg)'"
            style="transition: transform 0.3s"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
      </div>
    }
  </div>
</section>

<!-- Video Modal -->
<div class="video-modal" [class.active]="activeVideo()" (click)="closeVideo()">
  <div class="video-modal-inner" (click)="$event.stopPropagation()">
    <div class="video-modal-header">
      <span class="video-modal-title">{{ activeVideoTitle() }}</span>
      <button class="video-modal-close" (click)="closeVideo()">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="video-modal-body">
      @if (activeVideo()) {
        <iframe [src]="activeVideo()" frameborder="0" allowfullscreen allow="autoplay"></iframe>
      }
    </div>
  </div>
</div>
