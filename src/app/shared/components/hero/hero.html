<section id="home">
  <div class="hero-diag"></div>
  <div class="hero-inner">
    <!-- Left -->
    <div class="hero-left reveal">
      <div class="hero-eyebrow">
        <div class="hero-line"></div>
        <span>شريك التوثيق البصري</span>
      </div>
      <h1 class="hero-h1">
        نوثّق<br />
        <em>التقدّم</em><br />
        <span class="light">ونحفظ الإرث</span>
      </h1>
      <p class="hero-desc">
        منظومة توثيق بصري متكاملة لمشاريعك الكبرى — من أنظمة التصوير المستمر والتقارير الدورية إلى
        الإنتاج الوثائقي الاستراتيجي
      </p>
      <div class="hero-btns">
        <a class="btn-fill" (click)="scrollTo('contact')">
          ابدأ مشروعك
          <svg
            width="14"
            height="14"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
            style="transform: rotate(180deg)"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        </a>
        <a class="btn-ghost" (click)="scrollTo('portfolio')">تصفح الأعمال</a>
      </div>
    </div>

    <!-- Right: Stats -->
    <div class="hero-right reveal reveal-delay-2">
      <div class="stat-card featured">
        <div>
          <span class="sc-num">+2.7M</span>
          <span class="sc-label">صورة موثقة في الأرشيف السحابي</span>
        </div>
        <div class="sc-icon">📸</div>
      </div>
      <div class="stat-card">
        <span class="sc-num">+50</span>
        <span class="sc-label">مشروع عقاري وحكومي</span>
      </div>
      <div class="stat-card">
        <span class="sc-num">+600</span>
        <span class="sc-label">تقرير بصري دوري</span>
      </div>
    </div>
  </div>

  <!-- Scroll arrow -->
  <a class="hero-scroll" (click)="scrollTo('about')">
    <span class="scroll-txt">scroll</span>
    <div class="scroll-arrow">
      <svg
        width="12"
        height="12"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </a>
</section>
